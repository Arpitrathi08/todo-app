
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#020617,#1e293b);
}

.container{

    width:350px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(10px);

    padding:35px;

    border-radius:20px;

    box-shadow:0 10px 30px rgba(0,0,0,0.4);

    color:white;
}

h1{
    text-align:center;
    margin-bottom:25px;
}

.input-box{
    margin-bottom:18px;
    position:relative;
}

.input-box input{

    width:100%;

    padding:14px 45px 14px 15px;

    border:none;

    border-radius:12px;

    outline:none;

    background:#334155;

    color:white;

}

.input-box i{

    position:absolute;

    right:15px;

    top:15px;

    color:#94a3b8;

}

button{

    width:100%;

    padding:14px;

    border:none;

    border-radius:12px;

    background:#3b82f6;

    color:white;

    font-size:16px;

    cursor:pointer;

    transition:0.3s;

}

button:hover{
    background:#2563eb;
}

.link{

    text-align:center;

    margin-top:15px;

}

.link a{

    color:#38bdf8;

    text-decoration:none;

}

</style>

</head>
<body>

<div class="container">

    <h1>Welcome Back</h1>

    <form id="loginForm">

        <div class="input-box">

            <input
            type="email"
            id="email"
            placeholder="Email"
            required>

            <i class="fa-solid fa-envelope"></i>

        </div>

        <div class="input-box">

            <input
            type="password"
            id="password"
            placeholder="Password"
            required>

            <i class="fa-solid fa-lock"></i>

        </div>

        <button type="submit">

            Login

        </button>

    </form>

    <div class="link">

        Don't have an account?

        <a href="/register">Register</a>

    </div>

</div>

<script>

document.getElementById("loginForm")
.addEventListener("submit", async (e)=>{

    e.preventDefault();

    const email =
    document.getElementById("email").value;

    const password =
    document.getElementById("password").value;

    const response = await fetch("/api/auth/login",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            email,
            password
        })

    });

    const data = await response.json();

    alert(data.message);

    if(data.token){

        localStorage.setItem("token", data.token);

        window.location.href="/dashboard";

    }

});

</script>

</body>
</html>
